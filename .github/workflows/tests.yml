name: Testes Automatizados
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    # Configura o ambiente Python na VM
    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
        
    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        # Se você usa pip comum com requirements.txt:
        # pip install -r requirements.txt
        # Se você usa o pyproject.toml diretamente com pip:
        pip install .[test] || pip install pytest

    # Executa os testes exatamente com o comando solicitado
    - name: Executar Pytest
      run: pytest tests/ -v
